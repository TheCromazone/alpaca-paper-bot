<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Alpaca paper trading bot — technical review</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1c21; font-family: "Inter", sans-serif; color: #1a1c21; }
  em { font-style: normal; }
  deck-stage > section { transition: opacity 360ms ease; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="deck-stage.js"></script>
</head>
<body>
<deck-stage width="1920" height="1080">
  <section data-label="Cover"           id="s1"></section>
  <section data-label="Agenda"          id="s2"></section>
  <section data-label="In plain English" id="s3"></section>
  <section data-label="Why this exists" id="s4"></section>
  <section data-label="At a glance"     id="s5"></section>
  <section data-label="The recipe"      id="s6"></section>
  <section data-label="Signal: News"    id="s7"></section>
  <section data-label="Signal: Politicians" id="s8"></section>
  <section data-label="Signal: Investors"   id="s9"></section>
  <section data-label="Signal: Price"   id="s10"></section>
  <section data-label="Composite score" id="s11"></section>
  <section data-label="Score to action" id="s12"></section>
  <section data-label="Decision tree"   id="s13"></section>
  <section data-label="Risk guardrails" id="s14"></section>
  <section data-label="A typical tick"  id="s15"></section>
  <section data-label="Tech stack"      id="s16"></section>
  <section data-label="Data model"      id="s17"></section>
  <section data-label="Dashboard"       id="s18"></section>
  <section data-label="Current limits"  id="s19"></section>
  <section data-label="Roadmap near"    id="s20"></section>
  <section data-label="Roadmap mid"     id="s21"></section>
  <section data-label="Roadmap long"    id="s22"></section>
  <section data-label="Summary"         id="s23"></section>
</deck-stage>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
  const TOTAL = 23;
  const mount = (id, node) => {
    const el = document.getElementById(id);
    if (!el) return;
    ReactDOM.createRoot(el).render(node);
  };
  mount('s1',  <CoverSlide />);
  mount('s2',  <AgendaSlide num={2} total={TOTAL} />);
  mount('s3',  <ELI10Slide num={3} total={TOTAL} />);
  mount('s4',  <WhySlide num={4} total={TOTAL} />);
  mount('s5',  <QuickFactsSlide num={5} total={TOTAL} />);
  mount('s6',  <RecipeSlide num={6} total={TOTAL} />);
  mount('s7',  <SignalSlide num={7} total={TOTAL} {...SIGNAL_NEWS} />);
  mount('s8',  <SignalSlide num={8} total={TOTAL} {...SIGNAL_POL} />);
  mount('s9',  <SignalSlide num={9} total={TOTAL} {...SIGNAL_13F} />);
  mount('s10', <SignalSlide num={10} total={TOTAL} {...SIGNAL_PRICE} />);
  mount('s11', <FormulaSlide num={11} total={TOTAL} />);
  mount('s12', <ScoreToActionSlide num={12} total={TOTAL} />);
  mount('s13', <DecisionSlide num={13} total={TOTAL} />);
  mount('s14', <RiskSlide num={14} total={TOTAL} />);
  mount('s15', <TickSlide num={15} total={TOTAL} />);
  mount('s16', <StackSlide num={16} total={TOTAL} />);
  mount('s17', <DataModelSlide num={17} total={TOTAL} />);
  mount('s18', <DashboardSlide num={18} total={TOTAL} />);
  mount('s19', <LimitsSlide num={19} total={TOTAL} />);
  mount('s20', <RoadmapSlide num={20} total={TOTAL} horizon="next" tag="0–2 months"
                 intro="Cheap, high‑leverage things to ship before touching the model."
                 items={NEAR} />);
  mount('s21', <RoadmapSlide num={21} total={TOTAL} horizon="in the mid term" tag="2–6 months"
                 intro="Touch the model itself, once the backtester exists to measure changes."
                 items={MID} />);
  mount('s22', <RoadmapSlide num={22} total={TOTAL} horizon="in the long term" tag="6 months +"
                 intro="Bigger structural changes, and the path to real money."
                 items={LONG} />);
  mount('s23', <SummarySlide num={23} total={TOTAL} />);
</script>
</body>
</html>
