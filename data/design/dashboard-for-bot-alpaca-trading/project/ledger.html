<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Ledger — Paper Trading Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600;1,9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Dark techy terminal palette */
    --bg-0: #06080c;
    --bg-1: #0a0e16;
    --bg-2: #0f1421;
    --bg-3: #141a2b;
    --panel: rgba(14, 20, 34, 0.72);
    --panel-br: rgba(120, 180, 255, 0.08);
    --panel-br-strong: rgba(120, 180, 255, 0.18);

    --ink: #eaf0ff;
    --ink-muted: #98a4c2;
    --ink-faint: #5f6a86;
    --rule: rgba(120, 180, 255, 0.14);
    --rule-hair: rgba(120, 180, 255, 0.08);

    --cyan: oklch(78% 0.15 210);
    --cyan-glow: oklch(78% 0.16 210 / 0.55);
    --violet: oklch(70% 0.18 290);
    --violet-glow: oklch(70% 0.18 290 / 0.45);
    --lime: oklch(82% 0.20 145);
    --lime-glow: oklch(82% 0.22 145 / 0.55);
    --rose: oklch(70% 0.21 20);
    --rose-glow: oklch(70% 0.22 20 / 0.55);
    --amber: oklch(80% 0.17 75);

    --gain: var(--lime);
    --gain-glow: var(--lime-glow);
    --loss: var(--rose);
    --loss-glow: var(--rose-glow);
    --accent: var(--cyan);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg-0);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated aurora backdrop */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%,   oklch(40% 0.15 210 / 0.35), transparent 60%),
      radial-gradient(ellipse 80% 60% at 90% 20%,  oklch(40% 0.18 290 / 0.30), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, oklch(40% 0.17 145 / 0.22), transparent 60%),
      linear-gradient(180deg, #06080c 0%, #080b12 40%, #06080c 100%);
    animation: aurora 28s ease-in-out infinite alternate;
  }
  @keyframes aurora {
    0%   { filter: hue-rotate(0deg)   saturate(1); }
    50%  { filter: hue-rotate(20deg)  saturate(1.15); }
    100% { filter: hue-rotate(-15deg) saturate(0.95); }
  }

  /* Grid overlay */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(to right,  rgba(120,180,255,0.045) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(120,180,255,0.045) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 100% 80% at 50% 40%, black 40%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 40%, black 40%, transparent 90%);
  }

  /* Subtle scanline */
  .scanline {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 2;
    background: linear-gradient(180deg, transparent 0%, rgba(180,220,255,0.04) 50%, transparent 100%);
    height: 160px;
    animation: scan 12s linear infinite;
    mix-blend-mode: screen;
  }
  @keyframes scan {
    from { transform: translateY(-200px); }
    to   { transform: translateY(110vh); }
  }

  .display { font-family: "Fraunces", Georgia, serif; font-feature-settings: "ss01" 1, "ss02" 1; letter-spacing: -0.02em; }
  .mono { font-family: "JetBrains Mono", monospace; font-feature-settings: "tnum" 1, "lnum" 1; }
  .smallcaps { text-transform: uppercase; letter-spacing: 0.18em; }
  .tabular-nums { font-variant-numeric: tabular-nums; }

  .rule-top { border-top: 1px solid var(--rule); }
  .rule-bot { border-bottom: 1px solid var(--rule); }
  .rule-hair { border-bottom: 1px solid var(--rule-hair); }

  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--cyan); }

  /* Panel chrome */
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-br);
    border-radius: 6px;
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 18px 50px -18px rgba(0,0,0,0.55);
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(130deg, rgba(120,180,255,0.15), transparent 40%, transparent 60%, rgba(180,120,255,0.12));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Animations */
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 80s linear infinite; }
  .marquee-track.paused { animation-play-state: paused; }

  @keyframes rise { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
  .rise { animation: rise 700ms cubic-bezier(0.2,0.7,0.2,1) both; }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 var(--loss-glow); }
    50%      { transform: scale(1.15); opacity: 0.9; box-shadow: 0 0 0 8px transparent; }
  }
  .pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }

  @keyframes pulse-ring {
    0%   { transform: scale(0.8); opacity: 0.95; }
    80%  { transform: scale(3.2); opacity: 0; }
    100% { transform: scale(3.2); opacity: 0; }
  }
  .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.2,0.7,0.2,1) infinite; }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }
  .draw-in {
    stroke-dasharray: var(--len, 1000);
    stroke-dashoffset: var(--len, 1000);
    animation: draw 2.4s cubic-bezier(0.2,0.7,0.2,1) 200ms forwards;
  }

  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 3px var(--loss-glow)); }
    50%      { filter: drop-shadow(0 0 10px var(--loss-glow)); }
  }

  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, transparent 0%, rgba(180,220,255,0.18) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  @keyframes grow-w {
    from { width: 0; }
    to   { width: var(--w, 100%); }
  }
  .grow-w { animation: grow-w 1200ms cubic-bezier(0.2,0.7,0.2,1) 200ms both; }

  @keyframes float-y {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  @keyframes spin-slow { to { transform: rotate(360deg); } }

  /* Ticker strip */
  .ticker-strip {
    position: relative;
    overflow: hidden;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: linear-gradient(180deg, rgba(10,14,22,0.95), rgba(6,8,12,0.95));
    backdrop-filter: blur(12px);
  }
  .ticker-track {
    display: inline-flex; gap: 0; white-space: nowrap; will-change: transform;
  }
  .ticker-item {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 22px;
    border-right: 1px solid var(--rule-hair);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--ink-muted);
  }
  .ticker-item .sym { font-weight: 700; color: var(--ink); }
  .ticker-item .up   { color: var(--lime); text-shadow: 0 0 8px var(--lime-glow); }
  .ticker-item .down { color: var(--rose); text-shadow: 0 0 8px var(--rose-glow); }

  /* Spark bars */
  .bar-track { background: rgba(120,180,255,0.08); height: 4px; position: relative; overflow: hidden; border-radius: 2px; }
  .bar-fill { height: 100%; background: var(--cyan); transition: width 600ms cubic-bezier(0.2,0.7,0.2,1); border-radius: 2px; }
  .bar-fill.gain { background: var(--lime); box-shadow: 0 0 8px var(--lime-glow); }
  .bar-fill.loss { background: var(--rose); box-shadow: 0 0 8px var(--rose-glow); }

  /* Tweak panel */
  .tweak-panel {
    position: fixed; right: 16px; bottom: 16px;
    width: 280px;
    background: rgba(12, 18, 30, 0.92);
    border: 1px solid var(--panel-br-strong);
    border-radius: 8px;
    backdrop-filter: blur(16px);
    padding: 14px 16px 12px;
    z-index: 50;
    display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(120,180,255,0.05);
  }
  .tweak-panel.open { display: block; }
  .tweak-panel h3 {
    margin: 0 0 10px;
    font-family: "Fraunces", serif;
    font-size: 15px; font-style: italic; font-weight: 600;
    letter-spacing: 0.01em;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--ink);
  }
  .tweak-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 0;
    border-top: 1px solid var(--rule-hair);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-muted);
  }
  .tweak-row button {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--panel-br-strong);
    background: transparent; color: var(--ink-muted);
    padding: 4px 9px; cursor: pointer; border-radius: 3px;
    transition: all 150ms;
  }
  .tweak-row button:hover { color: var(--ink); border-color: var(--cyan); }
  .tweak-row button.on {
    background: var(--cyan); color: var(--bg-0); border-color: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .tweak-row .seg { display: inline-flex; gap: 4px; }

  /* Trade row hover reveal */
  .trade-row { transition: background 200ms, border-color 200ms; border-left: 2px solid transparent; padding-left: 10px; }
  .trade-row:hover { background: rgba(120,180,255,0.04); border-left-color: var(--cyan); }
  .trade-row .detail {
    max-height: 0; overflow: hidden;
    transition: max-height 320ms cubic-bezier(0.2,0.7,0.2,1), opacity 240ms;
    opacity: 0;
  }
  .trade-row:hover .detail { max-height: 200px; opacity: 1; }

  :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

  /* Cadence bar */
  .cadence-bar { position: relative; height: 3px; background: rgba(120,180,255,0.1); overflow: hidden; border-radius: 2px; }
  .cadence-bar > span {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    box-shadow: 0 0 12px var(--cyan-glow);
  }

  /* Donut */
  .donut-wrap { position: relative; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; pointer-events: none; text-align: center;
  }

  svg.equity { cursor: crosshair; }

  .stat-card {
    padding: 12px 14px;
    border: 1px solid var(--panel-br);
    border-radius: 5px;
    background: rgba(10,14,22,0.55);
    backdrop-filter: blur(8px);
    transition: border-color 200ms;
  }
  .stat-card:hover { border-color: var(--panel-br-strong); }

  @media (max-width: 760px) {
    .hide-sm { display: none; }
  }

  .page { position: relative; z-index: 3; max-width: 1440px; margin: 0 auto; padding: 20px 24px 80px; }

  /* Number tick flash helper */
  .num-flash {
    background: linear-gradient(90deg, transparent, rgba(120,180,255,0.18), transparent);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }

  /* Section head accent bar */
  .accent-bar {
    display: inline-block; width: 3px; height: 18px;
    background: linear-gradient(180deg, var(--cyan), var(--violet));
    border-radius: 2px;
    box-shadow: 0 0 10px var(--cyan-glow);
    margin-right: 10px; vertical-align: middle;
  }

  /* Chip */
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 3px;
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    border: 1px solid var(--rule); color: var(--ink-muted);
    background: rgba(120,180,255,0.03);
  }
  .chip.buy { color: var(--lime); border-color: var(--lime-glow); box-shadow: 0 0 8px rgba(126,245,110,0.15) inset; }
  .chip.sell { color: var(--rose); border-color: var(--rose-glow); }
</style>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#0a0e16"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="oklch(78% 0.15 210)" stroke-width="3"/>
  <text x="200" y="158" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="36" fill="#eaf0ff">Ledger</text>
</svg>
</template>
</head>
<body>
  <div class="scanline"></div>
  <div id="root"></div>

  <script src="ledger-data.js"></script>
  <script type="text/babel" data-presets="env,react" src="components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="app.jsx"></script>
</body>
